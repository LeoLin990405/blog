<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" rx="12" fill="#0d1117"/>

  <!-- System 1 Box -->
  <rect x="40" y="40" width="270" height="260" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <!-- System 1 Header -->
  <rect x="40" y="40" width="270" height="48" rx="12" fill="#58a6ff" opacity="0.15"/>
  <rect x="40" y="76" width="270" height="12" fill="#161b22"/>
  <!-- Lightning icon -->
  <path d="M100 56 L92 70 L100 68 L96 82 L108 64 L100 66 Z" fill="#58a6ff" filter="url(#glow1)"/>
  <text x="120" y="72" font-size="18" font-weight="700" fill="#58a6ff">System 1</text>

  <!-- System 1 items -->
  <circle cx="72" cy="115" r="4" fill="#58a6ff" opacity="0.6"/>
  <text x="86" y="120" font-size="14" fill="#c9d1d9">Fast</text>
  <text x="170" y="120" font-size="12" fill="#8b949e">milliseconds</text>

  <circle cx="72" cy="150" r="4" fill="#58a6ff" opacity="0.6"/>
  <text x="86" y="155" font-size="14" fill="#c9d1d9">Automatic</text>
  <text x="170" y="155" font-size="12" fill="#8b949e">no effort</text>

  <circle cx="72" cy="185" r="4" fill="#58a6ff" opacity="0.6"/>
  <text x="86" y="190" font-size="14" fill="#c9d1d9">Parallel</text>
  <text x="170" y="190" font-size="12" fill="#8b949e">high capacity</text>

  <circle cx="72" cy="220" r="4" fill="#58a6ff" opacity="0.6"/>
  <text x="86" y="225" font-size="14" fill="#c9d1d9">Pattern Matching</text>

  <circle cx="72" cy="255" r="4" fill="#58a6ff" opacity="0.6"/>
  <text x="86" y="260" font-size="14" fill="#c9d1d9">Intuition</text>
  <text x="170" y="260" font-size="12" fill="#8b949e">unconscious</text>

  <!-- System 2 Box -->
  <rect x="410" y="40" width="270" height="260" rx="12" fill="#161b22" stroke="#6C63FF" stroke-width="2"/>
  <!-- System 2 Header -->
  <rect x="410" y="40" width="270" height="48" rx="12" fill="#6C63FF" opacity="0.15"/>
  <rect x="410" y="76" width="270" height="12" fill="#161b22"/>
  <!-- Brain/Gear icon -->
  <circle cx="468" cy="64" r="10" fill="none" stroke="#6C63FF" stroke-width="1.5"/>
  <path d="M468 54 L468 51 M468 74 L468 77 M458 64 L455 64 M478 64 L481 64 M461 57 L459 55 M475 71 L477 73 M461 71 L459 73 M475 57 L477 55" stroke="#6C63FF" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="468" cy="64" r="4" fill="#6C63FF" opacity="0.4"/>
  <text x="488" y="72" font-size="18" font-weight="700" fill="#6C63FF">System 2</text>

  <!-- System 2 items -->
  <circle cx="442" cy="115" r="4" fill="#6C63FF" opacity="0.6"/>
  <text x="456" y="120" font-size="14" fill="#c9d1d9">Slow</text>
  <text x="530" y="120" font-size="12" fill="#8b949e">seconds-minutes</text>

  <circle cx="442" cy="150" r="4" fill="#6C63FF" opacity="0.6"/>
  <text x="456" y="155" font-size="14" fill="#c9d1d9">Effortful</text>
  <text x="530" y="155" font-size="12" fill="#8b949e">attention needed</text>

  <circle cx="442" cy="185" r="4" fill="#6C63FF" opacity="0.6"/>
  <text x="456" y="190" font-size="14" fill="#c9d1d9">Serial</text>
  <text x="530" y="190" font-size="12" fill="#8b949e">limited capacity</text>

  <circle cx="442" cy="220" r="4" fill="#6C63FF" opacity="0.6"/>
  <text x="456" y="225" font-size="14" fill="#c9d1d9">Logical Reasoning</text>

  <circle cx="442" cy="255" r="4" fill="#6C63FF" opacity="0.6"/>
  <text x="456" y="260" font-size="14" fill="#c9d1d9">Deliberation</text>
  <text x="548" y="260" font-size="12" fill="#8b949e">conscious</text>

  <!-- Bidirectional Arrows in center -->
  <!-- Arrow S1 -> S2 (Propose) -->
  <line x1="315" y1="145" x2="405" y2="145" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="335" y="138" font-size="11" fill="#58a6ff" font-weight="600">Propose</text>

  <!-- Arrow S2 -> S1 (Monitor) -->
  <line x1="405" y1="195" x2="315" y2="195" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="335" y="215" font-size="11" fill="#6C63FF" font-weight="600">Monitor</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6C63FF"/>
    </marker>
  </defs>

  <!-- Center interaction icon -->
  <circle cx="360" cy="170" r="18" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>
  <path d="M352 170 L360 162 L368 170 L360 178 Z" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <circle cx="360" cy="170" r="3" fill="#8b949e" opacity="0.5"/>

  <!-- Bottom annotation -->
  <rect x="140" y="325" width="440" height="36" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="360" y="348" font-size="13" fill="#8b949e" text-anchor="middle" font-style="italic">System 1 proposes, System 2 supervises (sometimes)</text>
</svg>