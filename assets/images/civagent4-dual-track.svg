<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#6C63FF"/>
    </marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <polygon points="0 0, 6 0, 3 8" fill="#8b949e"/>
    </marker>
    <marker id="arrowDownGreen" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <polygon points="0 0, 6 0, 3 8" fill="#3fb950"/>
    </marker>
    <marker id="arrowLeftRed" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#f85149"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="450" rx="8" fill="#0d1117"/>
  <rect x="1" y="1" width="718" height="448" rx="7" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">Ming Dual-Track System / N-Version Programming</text>

  <!-- Left column: Grand Secretariat -->
  <rect x="60" y="60" width="220" height="90" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="170" y="90" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Grand Secretariat</text>
  <text x="170" y="110" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.85">(内阁)</text>
  <text x="170" y="135" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">Civil Service / keju background</text>

  <!-- Right column: Directorate of Ceremonial -->
  <rect x="440" y="60" width="220" height="90" rx="6" fill="#161b22" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="550" y="90" text-anchor="middle" fill="#6C63FF" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Directorate of Ceremonial</text>
  <text x="550" y="110" text-anchor="middle" fill="#6C63FF" font-family="system-ui, sans-serif" font-size="13" font-weight="600" opacity="0.85">(司礼监)</text>
  <text x="550" y="135" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">Palace Service / court background</text>

  <!-- Arrow: Draft Reply (票拟) going right -->
  <line x1="280" y1="88" x2="438" y2="88" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <rect x="318" y="72" width="102" height="20" rx="3" fill="#0d1117" stroke="none"/>
  <text x="369" y="86" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Draft Reply (票拟)</text>

  <!-- Arrow: Vermilion Rescript (批红) going left -->
  <line x1="440" y1="118" x2="282" y2="118" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrowLeft)"/>
  <rect x="300" y="108" width="140" height="18" rx="3" fill="#0d1117" stroke="none"/>
  <text x="369" y="121" text-anchor="middle" fill="#6C63FF" font-family="system-ui, sans-serif" font-size="11" font-weight="500">Vermilion Rescript (批红)</text>

  <!-- Vertical lines down to decision diamond -->
  <line x1="170" y1="150" x2="170" y2="195" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="550" y1="150" x2="550" y2="195" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Converge lines to diamond -->
  <line x1="170" y1="195" x2="320" y2="235" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="550" y1="195" x2="400" y2="235" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Decision diamond: Agree? -->
  <polygon points="360,205 420,245 360,285 300,245" fill="#161b22" stroke="#c9d1d9" stroke-width="1.5"/>
  <text x="360" y="242" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Agree?</text>
  <text x="360" y="257" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">一致?</text>

  <!-- Yes arrow down -->
  <line x1="360" y1="285" x2="360" y2="340" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowDownGreen)"/>
  <text x="375" y="318" fill="#3fb950" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Yes</text>

  <!-- No arrow left back to Secretariat -->
  <line x1="300" y1="245" x2="195" y2="245" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrowLeftRed)"/>
  <line x1="195" y1="245" x2="195" y2="155" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="195" cy="155" r="3" fill="#f85149"/>
  <text x="240" y="238" fill="#f85149" font-family="system-ui, sans-serif" font-size="11" font-weight="500">No</text>
  <text x="208" y="207" fill="#f85149" font-family="system-ui, sans-serif" font-size="9" opacity="0.8">Return to</text>
  <text x="208" y="218" fill="#f85149" font-family="system-ui, sans-serif" font-size="9" opacity="0.8">Secretariat</text>

  <!-- Six Ministries Execute box -->
  <rect x="260" y="348" width="200" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="360" y="370" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Six Ministries</text>
  <text x="360" y="388" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="12" opacity="0.8">(六部 — Execute)</text>

  <!-- Side annotation: N-Version Programming -->
  <rect x="510" y="200" width="190" height="80" rx="5" fill="#161b22" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="605" y="220" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="11" font-weight="600">N-Version Programming</text>
  <line x1="535" y1="228" x2="675" y2="228" stroke="#21262d" stroke-width="0.5"/>
  <text x="605" y="244" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Two independent teams</text>
  <text x="605" y="258" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">with different backgrounds</text>
  <text x="605" y="272" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Cross-validation at output</text>

  <!-- Connector line from annotation to diamond -->
  <line x1="510" y1="245" x2="422" y2="245" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom label -->
  <text x="360" y="435" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Uncorrelated biases + cross-validation = higher confidence</text>
</svg>