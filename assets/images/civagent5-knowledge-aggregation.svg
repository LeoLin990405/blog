<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="assemblyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b949e" fill-opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="450" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="240" y="28" fill="#c9d1d9" font-size="14" font-weight="600">Athenian Knowledge Aggregation System</text>

  <!-- ===== TRIBE RING (10 tribes in a circle) ===== -->
  <!-- Center of tribe ring: 240, 175. Radius: 120 -->

  <!-- Tribe 1 - top -->
  <circle cx="240" cy="55" r="14" fill="#6C63FF" opacity="0.85"/>
  <text x="240" y="59" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 1</text>
  <line x1="240" y1="69" x2="240" y2="115" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 2 -->
  <circle cx="312" cy="69" r="14" fill="#7B73FF" opacity="0.85"/>
  <text x="312" y="73" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 2</text>
  <line x1="304" y1="82" x2="270" y2="120" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 3 -->
  <circle cx="360" cy="120" r="14" fill="#8A84FF" opacity="0.85"/>
  <text x="360" y="124" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 3</text>
  <line x1="348" y1="128" x2="290" y2="155" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 4 -->
  <circle cx="370" cy="185" r="14" fill="#58a6ff" opacity="0.85"/>
  <text x="370" y="189" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 4</text>
  <line x1="356" y1="185" x2="295" y2="178" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 5 -->
  <circle cx="340" cy="250" r="14" fill="#4E9AFF" opacity="0.85"/>
  <text x="340" y="254" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 5</text>
  <line x1="328" y1="243" x2="280" y2="205" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 6 -->
  <circle cx="275" cy="285" r="14" fill="#5B8CFF" opacity="0.85"/>
  <text x="275" y="289" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 6</text>
  <line x1="268" y1="272" x2="252" y2="210" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 7 -->
  <circle cx="200" cy="285" r="14" fill="#6878FF" opacity="0.85"/>
  <text x="200" y="289" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 7</text>
  <line x1="208" y1="272" x2="228" y2="210" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 8 -->
  <circle cx="135" cy="250" r="14" fill="#7568FF" opacity="0.85"/>
  <text x="135" y="254" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 8</text>
  <line x1="148" y1="242" x2="198" y2="203" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 9 -->
  <circle cx="110" cy="185" r="14" fill="#8270FF" opacity="0.85"/>
  <text x="110" y="189" fill="#fff" font-size="7" text-anchor="middle" font-weight="500">Tribe 9</text>
  <line x1="124" y1="185" x2="185" y2="178" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tribe 10 -->
  <circle cx="120" cy="120" r="14" fill="#9080FF" opacity="0.85"/>
  <text x="120" y="124" fill="#fff" font-size="6.5" text-anchor="middle" font-weight="500">Tribe 10</text>
  <line x1="132" y1="128" x2="190" y2="155" stroke="#8b949e" stroke-opacity="0.5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Central Assembly Circle -->
  <circle cx="240" cy="175" r="55" fill="url(#assemblyGrad)" opacity="0.2" stroke="#6C63FF" stroke-width="1.5"/>
  <circle cx="240" cy="175" r="40" fill="url(#assemblyGrad)" opacity="0.15"/>
  <text x="240" y="168" fill="#c9d1d9" font-size="11" text-anchor="middle" font-weight="700">Ecclesia</text>
  <text x="240" y="183" fill="#8b949e" font-size="9" text-anchor="middle">(Assembly)</text>

  <!-- Label for tribe ring -->
  <text x="240" y="320" fill="#8b949e" font-size="9" text-anchor="middle" font-style="italic">10 Phylai (Tribes) ensure geographic diversity</text>

  <!-- ===== FUNNEL: Boule -> Prytaneis -> Daily Chair ===== -->
  <!-- Positioned below the circle, centered at x=240 -->

  <!-- Funnel trapezoid shape -->
  <path d="M160,340 L320,340 L290,370 L190,370 Z" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="240" y="358" fill="#58a6ff" font-size="11" text-anchor="middle" font-weight="600">Boule (500)</text>

  <path d="M190,374 L290,374 L270,400 L210,400 Z" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="240" y="391" fill="#58a6ff" font-size="10" text-anchor="middle" font-weight="600">Prytaneis (50)</text>

  <path d="M210,404 L270,404 L255,428 L225,428 Z" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="240" y="420" fill="#58a6ff" font-size="9" text-anchor="middle" font-weight="600">Daily Chair (1)</text>

  <!-- Downward arrows between funnel stages -->
  <text x="167" y="390" fill="#8b949e" font-size="8" transform="rotate(-72,167,390)">filter</text>
  <text x="313" y="390" fill="#8b949e" font-size="8" transform="rotate(72,313,390)">filter</text>

  <!-- Funnel label -->
  <text x="240" y="445" fill="#8b949e" font-size="8" text-anchor="middle">Narrowing funnel: sortition at every level</text>

  <!-- ===== SIDE PANEL: Condorcet Guarantee ===== -->
  <rect x="480" y="40" width="225" height="200" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <!-- Panel title -->
  <text x="592" y="62" fill="#6C63FF" font-size="11" text-anchor="middle" font-weight="700">Condorcet Jury Theorem</text>

  <!-- Guarantee text -->
  <text x="592" y="85" fill="#c9d1d9" font-size="9.5" text-anchor="middle">P(majority correct)</text>
  <text x="592" y="100" fill="#58a6ff" font-size="12" text-anchor="middle" font-weight="700" font-style="italic">&#x2192; 1  as  n &#x2192; &#x221E;</text>
  <text x="592" y="118" fill="#8b949e" font-size="8.5" text-anchor="middle">when each voter p &gt; 0.5</text>

  <!-- Mini curve sketch: S-curve approaching 1 -->
  <!-- Axes -->
  <line x1="510" y1="220" x2="680" y2="220" stroke="#8b949e" stroke-width="0.8"/>
  <line x1="510" y1="220" x2="510" y2="135" stroke="#8b949e" stroke-width="0.8"/>

  <!-- Axis labels -->
  <text x="595" y="234" fill="#8b949e" font-size="8" text-anchor="middle">n (voters / agents)</text>
  <text x="502" y="178" fill="#8b949e" font-size="8" text-anchor="middle" transform="rotate(-90,502,178)">P(correct)</text>

  <!-- y-axis ticks -->
  <text x="506" y="223" fill="#8b949e" font-size="7" text-anchor="end">0.5</text>
  <line x1="508" y1="220" x2="512" y2="220" stroke="#8b949e" stroke-width="0.5"/>
  <text x="506" y="143" fill="#8b949e" font-size="7" text-anchor="end">1.0</text>
  <line x1="508" y1="140" x2="512" y2="140" stroke="#8b949e" stroke-width="0.5"/>

  <!-- Dashed line at y=1.0 -->
  <line x1="510" y1="140" x2="680" y2="140" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- The S-curve (approaching 1) -->
  <path d="M515,218 C530,215 540,200 555,180 C570,160 590,148 620,144 C650,141 680,140 680,140" fill="none" stroke="#6C63FF" stroke-width="2" filter="url(#glow)"/>

  <!-- p=0.7 label on curve -->
  <circle cx="555" cy="180" r="2.5" fill="#58a6ff"/>
  <text x="560" y="175" fill="#58a6ff" font-size="7">p=0.7</text>

  <!-- p=0.6 curve (lower, slower convergence) -->
  <path d="M515,218 C535,216 555,210 575,198 C595,186 625,170 660,158 C675,153 680,150 680,148" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="665" y="158" fill="#8b949e" font-size="7">p=0.6</text>

  <!-- ===== SIDE PANEL: AI Mapping ===== -->
  <rect x="480" y="260" width="225" height="170" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="592" y="282" fill="#6C63FF" font-size="11" text-anchor="middle" font-weight="700">AI Orchestration Mapping</text>

  <!-- Mapping rows -->
  <text x="497" y="305" fill="#8b949e" font-size="8.5">Tribes</text>
  <text x="560" y="305" fill="#c9d1d9" font-size="8.5">&#x2192;</text>
  <text x="575" y="305" fill="#58a6ff" font-size="8.5">Different Providers</text>

  <text x="497" y="322" fill="#8b949e" font-size="8.5">Assembly</text>
  <text x="560" y="322" fill="#c9d1d9" font-size="8.5">&#x2192;</text>
  <text x="575" y="322" fill="#58a6ff" font-size="8.5">Multi-Agent Voting</text>

  <text x="497" y="339" fill="#8b949e" font-size="8.5">Sortition</text>
  <text x="560" y="339" fill="#c9d1d9" font-size="8.5">&#x2192;</text>
  <text x="575" y="339" fill="#58a6ff" font-size="8.5">Random Agent Selection</text>

  <text x="497" y="356" fill="#8b949e" font-size="8.5">Boule</text>
  <text x="560" y="356" fill="#c9d1d9" font-size="8.5">&#x2192;</text>
  <text x="575" y="356" fill="#58a6ff" font-size="8.5">Preprocessing Agent</text>

  <text x="497" y="373" fill="#8b949e" font-size="8.5">Ostracism</text>
  <text x="560" y="373" fill="#c9d1d9" font-size="8.5">&#x2192;</text>
  <text x="575" y="373" fill="#58a6ff" font-size="8.5">Agent Rotation/Demotion</text>

  <line x1="497" y1="385" x2="690" y2="385" stroke="#21262d" stroke-width="0.5"/>
  <text x="592" y="400" fill="#8b949e" font-size="7.5" text-anchor="middle" font-style="italic">Diversity of sources = diversity of agents</text>
  <text x="592" y="415" fill="#8b949e" font-size="7.5" text-anchor="middle" font-style="italic">Information aggregation &gt; majority rule</text>
</svg>