<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="450" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="600">Interdisciplinary Theory Bridge / 跨学科理论桥梁</text>

  <!-- LEFT COLUMN: 4 Theory Boxes -->
  <!-- Box 1: Simon -->
  <rect x="20" y="55" width="175" height="60" rx="6" fill="#161b22" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="107" y="78" text-anchor="middle" fill="#6C63FF" font-size="11" font-weight="600">Simon</text>
  <text x="107" y="96" text-anchor="middle" fill="#c9d1d9" font-size="10">Bounded Rationality</text>
  <text x="107" y="108" text-anchor="middle" fill="#8b949e" font-size="8">有限理性</text>

  <!-- Box 2: Hayek -->
  <rect x="20" y="130" width="175" height="60" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="107" y="153" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Hayek</text>
  <text x="107" y="171" text-anchor="middle" fill="#c9d1d9" font-size="10">Local Knowledge</text>
  <text x="107" y="183" text-anchor="middle" fill="#8b949e" font-size="8">地方知识论</text>

  <!-- Box 3: North -->
  <rect x="20" y="205" width="175" height="60" rx="6" fill="#161b22" stroke="#7ee787" stroke-width="1.5"/>
  <text x="107" y="228" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="600">North</text>
  <text x="107" y="246" text-anchor="middle" fill="#c9d1d9" font-size="10">Institutional Economics</text>
  <text x="107" y="258" text-anchor="middle" fill="#8b949e" font-size="8">制度经济学</text>

  <!-- Box 4: Olson -->
  <rect x="20" y="280" width="175" height="60" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="107" y="303" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Olson</text>
  <text x="107" y="321" text-anchor="middle" fill="#c9d1d9" font-size="10">Collective Action</text>
  <text x="107" y="333" text-anchor="middle" fill="#8b949e" font-size="8">集体行动逻辑</text>

  <!-- CENTER: CivAgent Hexagon -->
  <polygon points="360,70 415,105 415,175 360,210 305,175 305,105" fill="#161b22" stroke="#6C63FF" stroke-width="2" filter="url(#glow)"/>
  <polygon points="360,80 408,110 408,170 360,200 312,170 312,110" fill="none" stroke="#6C63FF" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="360" y="135" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="700">CivAgent</text>
  <text x="360" y="155" text-anchor="middle" fill="#8b949e" font-size="9">Multi-Agent Hub</text>
  <text x="360" y="170" text-anchor="middle" fill="#8b949e" font-size="9">多智能体中枢</text>

  <!-- Smaller hexagon below for visual balance -->
  <polygon points="360,230 390,247 390,283 360,300 330,283 330,247" fill="#161b22" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="360" y="262" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="600">57</text>
  <text x="360" y="276" text-anchor="middle" fill="#8b949e" font-size="8">Polities</text>
  <text x="360" y="288" text-anchor="middle" fill="#8b949e" font-size="8">政体配置</text>

  <!-- RIGHT COLUMN: 4 Implementation Boxes -->
  <!-- Box 1: Execution Efficiency -->
  <rect x="525" y="55" width="175" height="60" rx="6" fill="#161b22" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="612" y="78" text-anchor="middle" fill="#6C63FF" font-size="11" font-weight="600">Execution Efficiency</text>
  <text x="612" y="96" text-anchor="middle" fill="#c9d1d9" font-size="10">Optimal decision flows</text>
  <text x="612" y="108" text-anchor="middle" fill="#8b949e" font-size="8">最优决策流程</text>

  <!-- Box 2: Heterogeneous Tolerance -->
  <rect x="525" y="130" width="175" height="60" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="612" y="153" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Heterogeneous Tolerance</text>
  <text x="612" y="171" text-anchor="middle" fill="#c9d1d9" font-size="10">Local autonomy preserved</text>
  <text x="612" y="183" text-anchor="middle" fill="#8b949e" font-size="8">保留地方自主性</text>

  <!-- Box 3: Config as Institution -->
  <rect x="525" y="205" width="175" height="60" rx="6" fill="#161b22" stroke="#7ee787" stroke-width="1.5"/>
  <text x="612" y="228" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="600">Configuration as</text>
  <text x="612" y="244" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="600">Institution</text>
  <text x="612" y="258" text-anchor="middle" fill="#8b949e" font-size="8">配置即制度</text>

  <!-- Box 4: Free-Rider Prevention -->
  <rect x="525" y="280" width="175" height="60" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="612" y="303" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Free-Rider Prevention</text>
  <text x="612" y="321" text-anchor="middle" fill="#c9d1d9" font-size="10">Accountability mechanisms</text>
  <text x="612" y="333" text-anchor="middle" fill="#8b949e" font-size="8">搭便车防范机制</text>

  <!-- CONNECTION ARROWS: Left -> Center -->
  <!-- Simon -> Hub (purple) -->
  <line x1="195" y1="85" x2="305" y2="120" stroke="#6C63FF" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="305" cy="120" r="3" fill="#6C63FF"/>

  <!-- Hayek -> Hub (blue) -->
  <line x1="195" y1="160" x2="305" y2="145" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="305" cy="145" r="3" fill="#58a6ff"/>

  <!-- North -> Hub (green) -->
  <line x1="195" y1="235" x2="330" y2="265" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="330" cy="265" r="3" fill="#7ee787"/>

  <!-- Olson -> Hub (orange) -->
  <line x1="195" y1="310" x2="330" y2="283" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="330" cy="283" r="3" fill="#f0883e"/>

  <!-- CONNECTION ARROWS: Center -> Right -->
  <!-- Hub -> Execution Efficiency (purple) -->
  <line x1="415" y1="120" x2="525" y2="85" stroke="#6C63FF" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="525,85 518,80 518,90" fill="#6C63FF"/>

  <!-- Hub -> Heterogeneous Tolerance (blue) -->
  <line x1="415" y1="145" x2="525" y2="160" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="525,160 518,155 518,165" fill="#58a6ff"/>

  <!-- Hub -> Config as Institution (green) -->
  <line x1="390" y1="265" x2="525" y2="235" stroke="#7ee787" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="525,235 518,230 518,240" fill="#7ee787"/>

  <!-- Hub -> Free-Rider Prevention (orange) -->
  <line x1="390" y1="283" x2="525" y2="310" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="525,310 518,305 518,315" fill="#f0883e"/>

  <!-- BOTTOM BAR -->
  <rect x="40" y="365" width="640" height="40" rx="6" fill="none" stroke="#21262d" stroke-width="1"/>
  <rect x="40" y="365" width="640" height="40" rx="6" fill="url(#barGrad)" opacity="0.12"/>

  <!-- Timeline arrow -->
  <line x1="60" y1="385" x2="660" y2="385" stroke="#8b949e" stroke-width="1" stroke-opacity="0.5"/>
  <polygon points="660,385 653,381 653,389" fill="#8b949e" opacity="0.7"/>

  <!-- Bar content: 3 milestones -->
  <text x="140" y="382" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">6000 years</text>
  <text x="140" y="396" text-anchor="middle" fill="#8b949e" font-size="8">institutional experiments</text>

  <circle cx="280" cy="385" r="2" fill="#58a6ff"/>

  <text x="360" y="382" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">57 polity configs</text>
  <text x="360" y="396" text-anchor="middle" fill="#8b949e" font-size="8">政体配置</text>

  <circle cx="470" cy="385" r="2" fill="#58a6ff"/>

  <text x="570" y="382" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">6 orchestration modes</text>
  <text x="570" y="396" text-anchor="middle" fill="#8b949e" font-size="8">编排模式</text>

  <!-- Bottom label -->
  <text x="360" y="435" text-anchor="middle" fill="#8b949e" font-size="9">6000 年制度实验 → 57 种政体配置 → 6 种编排模式</text>
</svg>