<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #c9d1d9; }
      .title { font-size: 11px; font-weight: 600; }
      .label { font-size: 9px; fill: #8b949e; }
      .node { stroke-width: 1.5; }
      .arrow { stroke-width: 1.2; fill: none; }
      .cell-bg { rx: 8; ry: 8; }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8b949e"/>
    </marker>
    <marker id="arrowhead-accent" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#6C63FF"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#58a6ff"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#3fb950"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#d29922"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#f85149"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#39d353"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" fill="#0d1117" rx="12" ry="12"/>

  <!-- Main title -->
  <text x="360" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#c9d1d9">Six Orchestration Modes / 六种编排模式</text>

  <!-- Grid: 3 columns x 2 rows, each cell ~220x195 -->
  <!-- Row 1 -->

  <!-- ========== 1. Centralized (Star topology) ========== -->
  <rect x="18" y="42" width="220" height="195" class="cell-bg" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="128" y="62" text-anchor="middle" class="title" fill="#6C63FF">1. Centralized / 中央集权</text>
  <!-- Center node -->
  <circle cx="128" cy="120" r="16" fill="none" stroke="#6C63FF" stroke-width="2" class="node"/>
  <text x="128" y="124" text-anchor="middle" font-size="8" fill="#6C63FF">Main</text>
  <!-- Outer nodes -->
  <circle cx="68" cy="80" r="11" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="68" y="83" text-anchor="middle" font-size="7" fill="#8b949e">A</text>
  <circle cx="188" cy="80" r="11" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="188" y="83" text-anchor="middle" font-size="7" fill="#8b949e">B</text>
  <circle cx="68" cy="160" r="11" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="68" y="163" text-anchor="middle" font-size="7" fill="#8b949e">C</text>
  <circle cx="188" cy="160" r="11" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="188" y="163" text-anchor="middle" font-size="7" fill="#8b949e">D</text>
  <!-- Lines from center to outer -->
  <line x1="115" y1="109" x2="79" y2="87" stroke="#6C63FF" stroke-width="1.2" marker-end="url(#arrowhead-accent)"/>
  <line x1="141" y1="109" x2="177" y2="87" stroke="#6C63FF" stroke-width="1.2" marker-end="url(#arrowhead-accent)"/>
  <line x1="115" y1="131" x2="79" y2="153" stroke="#6C63FF" stroke-width="1.2" marker-end="url(#arrowhead-accent)"/>
  <line x1="141" y1="131" x2="177" y2="153" stroke="#6C63FF" stroke-width="1.2" marker-end="url(#arrowhead-accent)"/>
  <text x="128" y="192" text-anchor="middle" class="label">Star topology / Single authority</text>
  <text x="128" y="204" text-anchor="middle" class="label">星型拓扑 / 单一权威</text>

  <!-- ========== 2. Checks & Balances (Pipeline + feedback) ========== -->
  <rect x="250" y="42" width="220" height="195" class="cell-bg" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="360" y="62" text-anchor="middle" class="title" fill="#58a6ff">2. Checks &amp; Balances / 制衡</text>
  <!-- Three pipeline nodes -->
  <rect x="270" y="105" width="48" height="30" rx="5" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="294" y="124" text-anchor="middle" font-size="8" fill="#58a6ff">Draft</text>
  <rect x="336" y="105" width="48" height="30" rx="5" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="360" y="124" text-anchor="middle" font-size="8" fill="#58a6ff">Review</text>
  <rect x="402" y="105" width="48" height="30" rx="5" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="426" y="124" text-anchor="middle" font-size="8" fill="#58a6ff">Execute</text>
  <!-- Forward arrows -->
  <line x1="318" y1="120" x2="334" y2="120" stroke="#58a6ff" stroke-width="1.2" marker-end="url(#arrowhead-blue)"/>
  <line x1="384" y1="120" x2="400" y2="120" stroke="#58a6ff" stroke-width="1.2" marker-end="url(#arrowhead-blue)"/>
  <!-- Feedback arrow (Review back to Draft) -->
  <path d="M 348 105 Q 348 80, 306 80 Q 282 80, 282 105" stroke="#f85149" stroke-width="1.2" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="318" y="76" text-anchor="middle" font-size="7" fill="#f85149">Reject / 驳回</text>
  <text x="360" y="165" text-anchor="middle" class="label">Pipeline with feedback loop</text>
  <text x="360" y="177" text-anchor="middle" class="label">带反馈的流水线</text>

  <!-- ========== 3. Dual Power (Two parallel chains) ========== -->
  <rect x="482" y="42" width="220" height="195" class="cell-bg" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="592" y="62" text-anchor="middle" class="title" fill="#3fb950">3. Dual Power / 双轨</text>
  <!-- Chain A -->
  <rect x="520" y="78" width="40" height="20" rx="4" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <text x="540" y="92" text-anchor="middle" font-size="7" fill="#3fb950">A1</text>
  <rect x="520" y="108" width="40" height="20" rx="4" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <text x="540" y="122" text-anchor="middle" font-size="7" fill="#3fb950">A2</text>
  <rect x="520" y="138" width="40" height="20" rx="4" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <text x="540" y="152" text-anchor="middle" font-size="7" fill="#3fb950">A3</text>
  <line x1="540" y1="98" x2="540" y2="106" stroke="#3fb950" stroke-width="1"/>
  <line x1="540" y1="128" x2="540" y2="136" stroke="#3fb950" stroke-width="1"/>
  <!-- Chain B -->
  <rect x="640" y="78" width="40" height="20" rx="4" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <text x="660" y="92" text-anchor="middle" font-size="7" fill="#3fb950">B1</text>
  <rect x="640" y="108" width="40" height="20" rx="4" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <text x="660" y="122" text-anchor="middle" font-size="7" fill="#3fb950">B2</text>
  <rect x="640" y="138" width="40" height="20" rx="4" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <text x="660" y="152" text-anchor="middle" font-size="7" fill="#3fb950">B3</text>
  <line x1="660" y1="98" x2="660" y2="106" stroke="#3fb950" stroke-width="1"/>
  <line x1="660" y1="128" x2="660" y2="136" stroke="#3fb950" stroke-width="1"/>
  <!-- Cross approval dashed lines -->
  <line x1="560" y1="118" x2="638" y2="118" stroke="#3fb950" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="600" y="114" text-anchor="middle" font-size="6" fill="#8b949e">cross</text>
  <!-- Labels -->
  <text x="540" y="74" text-anchor="middle" font-size="7" fill="#8b949e">Chain A</text>
  <text x="660" y="74" text-anchor="middle" font-size="7" fill="#8b949e">Chain B</text>
  <!-- Converge -->
  <line x1="540" y1="158" x2="592" y2="180" stroke="#3fb950" stroke-width="1" marker-end="url(#arrowhead-green)"/>
  <line x1="660" y1="158" x2="608" y2="180" stroke="#3fb950" stroke-width="1" marker-end="url(#arrowhead-green)"/>
  <rect x="577" y="180" width="30" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1"/>
  <text x="592" y="191" text-anchor="middle" font-size="6" fill="#3fb950">Exec</text>
  <text x="592" y="215" text-anchor="middle" class="label">Parallel chains converge</text>
  <text x="592" y="227" text-anchor="middle" class="label">双链并行汇聚</text>

  <!-- Row 2 -->

  <!-- ========== 4. Federated (Coordinator + clusters) ========== -->
  <rect x="18" y="249" width="220" height="195" class="cell-bg" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="128" y="269" text-anchor="middle" class="title" fill="#d29922">4. Federated / 联邦</text>
  <!-- Coordinator -->
  <rect x="106" y="282" width="44" height="18" rx="4" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="128" y="295" text-anchor="middle" font-size="7" fill="#d29922">Coord</text>
  <!-- Three clusters -->
  <!-- Cluster A -->
  <rect x="38" y="330" width="50" height="44" rx="5" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="53" cy="344" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <circle cx="73" cy="344" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <circle cx="63" cy="362" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <!-- Cluster B -->
  <rect x="103" y="330" width="50" height="44" rx="5" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="118" cy="344" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <circle cx="138" cy="344" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <circle cx="128" cy="362" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <!-- Cluster C -->
  <rect x="168" y="330" width="50" height="44" rx="5" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="183" cy="344" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <circle cx="203" cy="344" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <circle cx="193" cy="362" r="7" fill="none" stroke="#d29922" stroke-width="1"/>
  <!-- Lines from coordinator to clusters -->
  <line x1="118" y1="300" x2="63" y2="328" stroke="#d29922" stroke-width="1" marker-end="url(#arrowhead-orange)"/>
  <line x1="128" y1="300" x2="128" y2="328" stroke="#d29922" stroke-width="1" marker-end="url(#arrowhead-orange)"/>
  <line x1="138" y1="300" x2="193" y2="328" stroke="#d29922" stroke-width="1" marker-end="url(#arrowhead-orange)"/>
  <text x="128" y="398" text-anchor="middle" class="label">Autonomous clusters + coordinator</text>
  <text x="128" y="410" text-anchor="middle" class="label">自治集群 + 协调者</text>

  <!-- ========== 5. Democratic Council (Circle + vote center) ========== -->
  <rect x="250" y="249" width="220" height="195" class="cell-bg" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="360" y="269" text-anchor="middle" class="title" fill="#bc8cff">5. Democratic Council / 民主议会</text>
  <!-- Circle of equal nodes -->
  <circle cx="360" cy="300" r="12" fill="none" stroke="#bc8cff" stroke-width="1.3"/>
  <text x="360" y="303" text-anchor="middle" font-size="7" fill="#bc8cff">1</text>
  <circle cx="320" cy="340" r="12" fill="none" stroke="#bc8cff" stroke-width="1.3"/>
  <text x="320" y="343" text-anchor="middle" font-size="7" fill="#bc8cff">2</text>
  <circle cx="400" cy="340" r="12" fill="none" stroke="#bc8cff" stroke-width="1.3"/>
  <text x="400" y="343" text-anchor="middle" font-size="7" fill="#bc8cff">3</text>
  <circle cx="335" cy="385" r="12" fill="none" stroke="#bc8cff" stroke-width="1.3"/>
  <text x="335" y="388" text-anchor="middle" font-size="7" fill="#bc8cff">4</text>
  <circle cx="385" cy="385" r="12" fill="none" stroke="#bc8cff" stroke-width="1.3"/>
  <text x="385" y="388" text-anchor="middle" font-size="7" fill="#bc8cff">5</text>
  <!-- Connecting lines between all (peer-to-peer) -->
  <line x1="350" y1="310" x2="328" y2="330" stroke="#bc8cff" stroke-width="0.6" opacity="0.4"/>
  <line x1="370" y1="310" x2="392" y2="330" stroke="#bc8cff" stroke-width="0.6" opacity="0.4"/>
  <line x1="332" y1="340" x2="388" y2="340" stroke="#bc8cff" stroke-width="0.6" opacity="0.4"/>
  <line x1="325" y1="352" x2="335" y2="373" stroke="#bc8cff" stroke-width="0.6" opacity="0.4"/>
  <line x1="395" y1="352" x2="385" y2="373" stroke="#bc8cff" stroke-width="0.6" opacity="0.4"/>
  <line x1="347" y1="385" x2="373" y2="385" stroke="#bc8cff" stroke-width="0.6" opacity="0.4"/>
  <line x1="348" y1="308" x2="390" y2="377" stroke="#bc8cff" stroke-width="0.4" opacity="0.25"/>
  <line x1="372" y1="308" x2="330" y2="377" stroke="#bc8cff" stroke-width="0.4" opacity="0.25"/>
  <line x1="320" y1="352" x2="385" y2="373" stroke="#bc8cff" stroke-width="0.4" opacity="0.25"/>
  <line x1="400" y1="352" x2="335" y2="373" stroke="#bc8cff" stroke-width="0.4" opacity="0.25"/>
  <!-- Vote box in center -->
  <rect x="345" y="335" width="30" height="18" rx="3" fill="#bc8cff" fill-opacity="0.15" stroke="#bc8cff" stroke-width="1"/>
  <text x="360" y="347" text-anchor="middle" font-size="6" fill="#bc8cff">Vote</text>
  <text x="360" y="418" text-anchor="middle" class="label">Equal peers + consensus voting</text>
  <text x="360" y="430" text-anchor="middle" class="label">平等节点 + 共识投票</text>

  <!-- ========== 6. Theocratic (Dominant node + subordinates) ========== -->
  <rect x="482" y="249" width="220" height="195" class="cell-bg" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="592" y="269" text-anchor="middle" class="title" fill="#f85149">6. Theocratic / 神权</text>
  <!-- Supreme node -->
  <circle cx="592" cy="300" r="18" fill="none" stroke="#f85149" stroke-width="2"/>
  <text x="592" y="303" text-anchor="middle" font-size="7" font-weight="600" fill="#f85149">GOD</text>
  <!-- Subordinate nodes -->
  <circle cx="532" cy="370" r="10" fill="none" stroke="#8b949e" stroke-width="1"/>
  <text x="532" y="373" text-anchor="middle" font-size="6" fill="#8b949e">a</text>
  <circle cx="567" cy="370" r="10" fill="none" stroke="#8b949e" stroke-width="1"/>
  <text x="567" y="373" text-anchor="middle" font-size="6" fill="#8b949e">b</text>
  <circle cx="602" cy="370" r="10" fill="none" stroke="#8b949e" stroke-width="1"/>
  <text x="602" y="373" text-anchor="middle" font-size="6" fill="#8b949e">c</text>
  <circle cx="637" cy="370" r="10" fill="none" stroke="#8b949e" stroke-width="1"/>
  <text x="637" y="373" text-anchor="middle" font-size="6" fill="#8b949e">d</text>
  <circle cx="662" cy="370" r="10" fill="none" stroke="#8b949e" stroke-width="1"/>
  <text x="662" y="373" text-anchor="middle" font-size="6" fill="#8b949e">e</text>
  <!-- One-way arrows down -->
  <line x1="580" y1="315" x2="535" y2="358" stroke="#f85149" stroke-width="1" marker-end="url(#arrowhead-red)"/>
  <line x1="585" y1="317" x2="568" y2="358" stroke="#f85149" stroke-width="1" marker-end="url(#arrowhead-red)"/>
  <line x1="592" y1="318" x2="602" y2="358" stroke="#f85149" stroke-width="1" marker-end="url(#arrowhead-red)"/>
  <line x1="599" y1="317" x2="634" y2="358" stroke="#f85149" stroke-width="1" marker-end="url(#arrowhead-red)"/>
  <line x1="604" y1="315" x2="657" y2="358" stroke="#f85149" stroke-width="1" marker-end="url(#arrowhead-red)"/>
  <text x="592" y="406" text-anchor="middle" class="label">Absolute authority, one-way command</text>
  <text x="592" y="418" text-anchor="middle" class="label">绝对权威 / 单向命令</text>

  <!-- Bottom attribution -->
  <text x="360" y="468" text-anchor="middle" font-size="9" fill="#21262d">CivAgent Series II — Orchestration Modes Typology</text>
</svg>