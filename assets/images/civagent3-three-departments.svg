<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <defs>
    <marker id="arrowAccent" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6C63FF"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="12" fill="#0d1117"/>
  <rect x="1" y="1" width="718" height="398" rx="11" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5">THREE DEPARTMENTS &amp; SIX MINISTRIES</text>

  <!-- User Request arrow -->
  <text x="360" y="55" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="11" font-weight="500">User Request</text>
  <line x1="360" y1="60" x2="360" y2="85" stroke="#6C63FF" stroke-width="2" marker-end="url(#arrowAccent)"/>

  <!-- Three Department Boxes -->
  <!-- Secretariat -->
  <rect x="60" y="90" width="170" height="80" rx="8" fill="#161b22" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="145" y="117" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Secretariat</text>
  <text x="145" y="135" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">中书省 / Draft</text>
  <circle cx="80" cy="155" r="3" fill="#6C63FF" opacity="0.5"/>
  <circle cx="92" cy="155" r="3" fill="#6C63FF" opacity="0.3"/>
  <circle cx="104" cy="155" r="3" fill="#6C63FF" opacity="0.15"/>

  <!-- Chancellery -->
  <rect x="275" y="90" width="170" height="80" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="360" y="117" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Chancellery</text>
  <text x="360" y="135" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">门下省 / Review</text>
  <circle cx="295" cy="155" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="307" cy="155" r="3" fill="#58a6ff" opacity="0.3"/>
  <circle cx="319" cy="155" r="3" fill="#58a6ff" opacity="0.15"/>

  <!-- Dept of State Affairs -->
  <rect x="490" y="90" width="170" height="80" rx="8" fill="#161b22" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="575" y="112" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Dept. of State Affairs</text>
  <text x="575" y="130" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">尚书省 / Execute</text>
  <circle cx="510" cy="155" r="3" fill="#6C63FF" opacity="0.5"/>
  <circle cx="522" cy="155" r="3" fill="#6C63FF" opacity="0.3"/>
  <circle cx="534" cy="155" r="3" fill="#6C63FF" opacity="0.15"/>

  <!-- Forward arrows: Secretariat -> Chancellery -> Dept -->
  <line x1="230" y1="120" x2="273" y2="120" stroke="#6C63FF" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="252" y="113" text-anchor="middle" fill="#6C63FF" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Draft</text>

  <line x1="445" y1="120" x2="488" y2="120" stroke="#6C63FF" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="467" y="113" text-anchor="middle" fill="#6C63FF" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Review</text>

  <!-- Reject & Revise curved arrow (Chancellery back to Secretariat) -->
  <path d="M 310 170 Q 310 205, 230 205 Q 145 205, 145 175" fill="none" stroke="#f85149" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <rect x="175" y="196" width="110" height="18" rx="4" fill="#0d1117" stroke="none"/>
  <text x="230" y="210" text-anchor="middle" fill="#f85149" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Reject &amp; Revise</text>

  <!-- Vertical line from Dept to Six Ministries -->
  <line x1="575" y1="170" x2="575" y2="240" stroke="#6C63FF" stroke-width="1.5" opacity="0.6"/>

  <!-- Horizontal connector for six ministries -->
  <line x1="85" y1="260" x2="635" y2="260" stroke="#21262d" stroke-width="1.5"/>

  <!-- Six vertical lines down to ministry boxes -->
  <line x1="85" y1="240" x2="85" y2="280" stroke="#6C63FF" stroke-width="1" opacity="0.4" marker-end="url(#arrowMuted)"/>
  <line x1="195" y1="240" x2="195" y2="280" stroke="#6C63FF" stroke-width="1" opacity="0.4" marker-end="url(#arrowMuted)"/>
  <line x1="305" y1="240" x2="305" y2="280" stroke="#6C63FF" stroke-width="1" opacity="0.4" marker-end="url(#arrowMuted)"/>
  <line x1="415" y1="240" x2="415" y2="280" stroke="#6C63FF" stroke-width="1" opacity="0.4" marker-end="url(#arrowMuted)"/>
  <line x1="525" y1="240" x2="525" y2="280" stroke="#6C63FF" stroke-width="1" opacity="0.4" marker-end="url(#arrowMuted)"/>
  <line x1="635" y1="240" x2="635" y2="280" stroke="#6C63FF" stroke-width="1" opacity="0.4" marker-end="url(#arrowMuted)"/>

  <!-- Six Ministry boxes -->
  <rect x="40" y="285" width="90" height="42" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="85" y="303" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Personnel</text>
  <text x="85" y="318" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">吏部</text>

  <rect x="150" y="285" width="90" height="42" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="195" y="303" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Revenue</text>
  <text x="195" y="318" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">户部</text>

  <rect x="260" y="285" width="90" height="42" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="305" y="303" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Rites</text>
  <text x="305" y="318" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">礼部</text>

  <rect x="370" y="285" width="90" height="42" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="415" y="303" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">War</text>
  <text x="415" y="318" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">兵部</text>

  <rect x="480" y="285" width="90" height="42" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="525" y="303" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Justice</text>
  <text x="525" y="318" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">刑部</text>

  <rect x="590" y="285" width="90" height="42" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="635" y="303" text-anchor="middle" fill="#c9d1d9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Works</text>
  <text x="635" y="318" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">工部</text>

  <!-- Compiler Analogy annotation -->
  <rect x="50" y="348" width="620" height="38" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="360" y="362" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Compiler Analogy</text>
  <text x="145" y="378" text-anchor="middle" fill="#6C63FF" font-family="monospace" font-size="10">Frontend (parsing)</text>
  <text x="360" y="378" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="10">Middle-end (validation)</text>
  <text x="575" y="378" text-anchor="middle" fill="#6C63FF" font-family="monospace" font-size="10">Backend (codegen)</text>
</svg>