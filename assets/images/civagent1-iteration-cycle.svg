<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6C63FF"/>
    </marker>
    <marker id="arrowhead-muted" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <linearGradient id="timeline-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="12" fill="#0d1117"/>
  <rect x="1" y="1" width="718" height="398" rx="11" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="600">Institutional Iteration Cycle / 制度迭代循环</text>
  <text x="360" y="54" text-anchor="middle" fill="#8b949e" font-size="11">Based on Qian Mu's analysis / 基于钱穆《中国历代政治得失》</text>

  <!-- Timeline base line -->
  <line x1="50" y1="190" x2="670" y2="190" stroke="#21262d" stroke-width="2"/>

  <!-- Node positions: 6 nodes evenly spaced -->
  <!-- Qin: 90, Han: 215, Tang: 340, Song: 465, Ming: 540, Qing: 640 -->

  <!-- Node 1: Qin -->
  <rect x="50" y="140" width="80" height="50" rx="8" fill="#161b22" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="90" y="162" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Qin / 秦</text>
  <text x="90" y="178" text-anchor="middle" fill="#8b949e" font-size="9">221 BC</text>
  <text x="90" y="210" text-anchor="middle" fill="#6C63FF" font-size="9">Centralized</text>
  <text x="90" y="222" text-anchor="middle" fill="#8b949e" font-size="8">三公九卿</text>

  <!-- Arrow 1→2 -->
  <line x1="132" y1="165" x2="168" y2="165" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Node 2: Han -->
  <rect x="170" y="140" width="90" height="50" rx="8" fill="#161b22" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="215" y="162" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Han / 汉</text>
  <text x="215" y="178" text-anchor="middle" fill="#8b949e" font-size="9">202 BC</text>
  <text x="215" y="210" text-anchor="middle" fill="#f97583" font-size="9">Inner Court</text>
  <text x="215" y="222" text-anchor="middle" fill="#8b949e" font-size="8">bypass attack</text>

  <!-- Arrow 2→3 -->
  <line x1="262" y1="165" x2="288" y2="165" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Node 3: Tang -->
  <rect x="290" y="140" width="90" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="335" y="162" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Tang / 唐</text>
  <text x="335" y="178" text-anchor="middle" fill="#8b949e" font-size="9">618 AD</text>
  <text x="335" y="210" text-anchor="middle" fill="#58a6ff" font-size="9">Three Depts</text>
  <text x="335" y="222" text-anchor="middle" fill="#8b949e" font-size="8">checks &amp; balances</text>

  <!-- Arrow 3→4 -->
  <line x1="382" y1="165" x2="408" y2="165" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Node 4: Song -->
  <rect x="410" y="140" width="90" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="455" y="162" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Song / 宋</text>
  <text x="455" y="178" text-anchor="middle" fill="#8b949e" font-size="9">960 AD</text>
  <text x="455" y="210" text-anchor="middle" fill="#79c0ff" font-size="9">Functional split</text>
  <text x="455" y="222" text-anchor="middle" fill="#8b949e" font-size="8">least privilege</text>

  <!-- Arrow 4→5 -->
  <line x1="502" y1="165" x2="528" y2="165" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Node 5: Ming -->
  <rect x="530" y="140" width="80" height="50" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="570" y="162" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Ming / 明</text>
  <text x="570" y="178" text-anchor="middle" fill="#8b949e" font-size="9">1368 AD</text>
  <text x="570" y="210" text-anchor="middle" fill="#d2a8ff" font-size="9">Abolish PM</text>
  <text x="570" y="222" text-anchor="middle" fill="#8b949e" font-size="8">dual track</text>

  <!-- Arrow 5→6 -->
  <line x1="612" y1="165" x2="628" y2="165" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Node 6: Qing -->
  <rect x="630" y="140" width="80" height="50" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="670" y="162" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Qing / 清</text>
  <text x="670" y="178" text-anchor="middle" fill="#8b949e" font-size="9">1644 AD</text>
  <text x="670" y="210" text-anchor="middle" fill="#ffa657" font-size="9">Grand Council</text>
  <text x="670" y="222" text-anchor="middle" fill="#8b949e" font-size="8">fast path / QoS</text>

  <!-- Feedback loop: curved arrow from right back to left underneath -->
  <path d="M 670,195 C 670,310 90,310 90,195" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead-muted)"/>

  <!-- Feedback label -->
  <rect x="280" y="280" width="180" height="46" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="370" y="298" text-anchor="middle" fill="#f97583" font-size="10" font-weight="500">Each solution creates new problems</text>
  <text x="370" y="314" text-anchor="middle" fill="#8b949e" font-size="10">每个解决方案产生新问题</text>

  <!-- Problem annotations under each transition -->
  <text x="152" y="248" text-anchor="middle" fill="#f97583" font-size="8">PM too powerful</text>
  <text x="152" y="258" text-anchor="middle" fill="#8b949e" font-size="8">丞相权过大</text>

  <text x="272" y="248" text-anchor="middle" fill="#f97583" font-size="8">Informal bypass</text>
  <text x="272" y="258" text-anchor="middle" fill="#8b949e" font-size="8">非正式绕过</text>

  <text x="395" y="248" text-anchor="middle" fill="#f97583" font-size="8">Veto gridlock</text>
  <text x="395" y="258" text-anchor="middle" fill="#8b949e" font-size="8">封驳权过大</text>

  <text x="510" y="248" text-anchor="middle" fill="#f97583" font-size="8">Info overload</text>
  <text x="510" y="258" text-anchor="middle" fill="#8b949e" font-size="8">信息过载</text>

  <text x="630" y="248" text-anchor="middle" fill="#f97583" font-size="8">Emperor-dependent</text>
  <text x="630" y="258" text-anchor="middle" fill="#8b949e" font-size="8">依赖皇帝能力</text>

  <!-- Legend -->
  <text x="360" y="365" text-anchor="middle" fill="#8b949e" font-size="10">Qian Mu: "We cannot judge the institutions of earlier eras by the standards of later generations"</text>
  <text x="360" y="380" text-anchor="middle" fill="#8b949e" font-size="10">钱穆：「不能用后代的眼光来批评前代的制度」</text>
</svg>