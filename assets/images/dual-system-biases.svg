<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="400" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="360" y="38" font-size="18" font-weight="700" fill="#c9d1d9" text-anchor="middle">Cognitive Biases → Agent Failure Modes</text>
  <line x1="160" y1="50" x2="560" y2="50" stroke="#21262d" stroke-width="1"/>

  <!-- Row 1 -->
  <!-- Card 1: Confirmation Bias -->
  <rect x="26" y="70" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="103" y="97" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Confirmation</text>
  <text x="103" y="113" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Bias</text>
  <!-- Icon: magnifying glass with check -->
  <circle cx="103" cy="140" r="12" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <path d="M111 148 L118 155" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M98 140 L101 144 L108 136" stroke="#d29922" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Mitigation badge -->
  <rect x="56" y="165" width="94" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="103" y="180" font-size="9" fill="#3fb950" text-anchor="middle">Red Team Agent</text>

  <!-- Card 2: Anchoring Effect -->
  <rect x="197" y="70" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="274" y="97" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Anchoring</text>
  <text x="274" y="113" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Effect</text>
  <!-- Icon: anchor -->
  <circle cx="274" cy="133" r="4" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="274" y1="137" x2="274" y2="152" stroke="#8b949e" stroke-width="1.2"/>
  <path d="M264 148 Q 264 156 274 156 Q 284 156 284 148" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <rect x="224" y="165" width="100" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="274" y="180" font-size="9" fill="#3fb950" text-anchor="middle">Multi-eval Median</text>

  <!-- Card 3: Availability Bias -->
  <rect x="368" y="70" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="445" y="97" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Availability</text>
  <text x="445" y="113" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Bias</text>
  <!-- Icon: stacked bars (frequency) -->
  <rect x="430" y="148" width="8" height="12" rx="1" fill="#8b949e" opacity="0.8"/>
  <rect x="441" y="140" width="8" height="20" rx="1" fill="#8b949e" opacity="0.6"/>
  <rect x="452" y="132" width="8" height="28" rx="1" fill="#8b949e" opacity="0.4"/>
  <rect x="395" y="165" width="100" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="445" y="180" font-size="9" fill="#3fb950" text-anchor="middle">Diversify Retrieval</text>

  <!-- Card 4: Framing Effect -->
  <rect x="539" y="70" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="616" y="97" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Framing</text>
  <text x="616" y="113" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Effect</text>
  <!-- Icon: two frames -->
  <rect x="601" y="130" width="14" height="14" rx="2" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <rect x="617" y="138" width="14" height="14" rx="2" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="566" y="165" width="100" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="616" y="180" font-size="9" fill="#3fb950" text-anchor="middle">Cross-Validation</text>

  <!-- Row 2 -->
  <!-- Card 5: Sunk Cost -->
  <rect x="26" y="220" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="103" y="247" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Sunk Cost</text>
  <text x="103" y="263" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Fallacy</text>
  <!-- Icon: downward spiral/drain -->
  <path d="M95 290 Q 103 282 111 290 Q 103 298 95 290" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <path d="M99 286 Q 103 278 107 286" fill="none" stroke="#8b949e" stroke-width="1" opacity="0.6"/>
  <line x1="103" y1="295" x2="103" y2="305" stroke="#8b949e" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="50" y="315" width="106" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="103" y="330" font-size="9" fill="#3fb950" text-anchor="middle">Periodic Reset</text>

  <!-- Card 6: Overconfidence -->
  <rect x="197" y="220" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="274" y="247" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Overconfidence</text>
  <text x="274" y="263" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">(Hallucination)</text>
  <!-- Icon: gauge pegged high -->
  <circle cx="274" cy="292" r="14" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="274" y1="292" x2="283" y2="283" stroke="#f85149" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="274" cy="292" r="2" fill="#8b949e"/>
  <rect x="218" y="315" width="112" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="274" y="330" font-size="9" fill="#3fb950" text-anchor="middle">Calibration Training</text>

  <!-- Card 7: Group Polarization -->
  <rect x="368" y="220" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="445" y="247" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Group</text>
  <text x="445" y="263" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Polarization</text>
  <!-- Icon: diverging arrows -->
  <line x1="445" y1="280" x2="430" y2="300" stroke="#8b949e" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="445" y1="280" x2="460" y2="300" stroke="#8b949e" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="430" cy="302" r="3" fill="#8b949e" opacity="0.5"/>
  <circle cx="460" cy="302" r="3" fill="#8b949e" opacity="0.5"/>
  <rect x="389" y="315" width="112" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="445" y="330" font-size="9" fill="#3fb950" text-anchor="middle">Devil's Advocate</text>

  <!-- Card 8: Endowment Effect -->
  <rect x="539" y="220" width="155" height="130" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="616" y="247" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Endowment</text>
  <text x="616" y="263" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle">Effect</text>
  <!-- Icon: hand holding/protecting -->
  <path d="M606 288 Q 606 280 616 280 Q 626 280 626 288 L626 298 L606 298 Z" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <circle cx="616" cy="292" r="3" fill="#8b949e" opacity="0.4"/>
  <rect x="560" y="315" width="112" height="22" rx="4" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="616" y="330" font-size="9" fill="#3fb950" text-anchor="middle">Independent Rewrite</text>

  <!-- Bottom legend -->
  <rect x="200" y="365" width="14" height="14" rx="3" fill="none" stroke="#d29922" stroke-width="1.2"/>
  <text x="220" y="377" font-size="11" fill="#8b949e">Bias / Failure Mode</text>
  <rect x="370" y="365" width="14" height="14" rx="3" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="0.8"/>
  <text x="390" y="377" font-size="11" fill="#8b949e">Mitigation Strategy</text>
</svg>