<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" fill="none">
  <defs>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="460" rx="12" fill="#0d1117"/>
  <rect x="1" y="1" width="718" height="458" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#c9d1d9">Near-Decomposable Architecture</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8b949e">Simon (1962): "The Architecture of Complexity"</text>

  <!-- Outer system box -->
  <rect x="60" y="80" width="600" height="320" rx="12" fill="none" stroke="#21262d" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="360" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" font-weight="600">Complex System</text>

  <!-- Subsystem A -->
  <rect x="85" y="115" width="175" height="175" rx="10" fill="#161b22" stroke="#6C63FF" stroke-width="2"/>
  <text x="172" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6C63FF" font-weight="600">Subsystem A</text>

  <!-- Nodes in A -->
  <circle cx="125" cy="185" r="20" fill="#0d1117" stroke="#6C63FF" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="125" y="189" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">A1</text>

  <circle cx="210" cy="175" r="20" fill="#0d1117" stroke="#6C63FF" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="210" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">A2</text>

  <circle cx="165" cy="250" r="20" fill="#0d1117" stroke="#6C63FF" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="165" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">A3</text>

  <!-- Strong connections within A (thick solid lines) -->
  <line x1="143" y1="177" x2="192" y2="173" stroke="#6C63FF" stroke-width="3" opacity="0.7"/>
  <line x1="135" y1="201" x2="153" y2="234" stroke="#6C63FF" stroke-width="3" opacity="0.7"/>
  <line x1="198" y1="191" x2="178" y2="236" stroke="#6C63FF" stroke-width="3" opacity="0.7"/>

  <!-- Subsystem B -->
  <rect x="275" y="115" width="175" height="175" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="362" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#58a6ff" font-weight="600">Subsystem B</text>

  <!-- Nodes in B -->
  <circle cx="320" cy="180" r="20" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="320" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">B1</text>

  <circle cx="400" cy="180" r="20" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="400" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">B2</text>

  <circle cx="362" cy="255" r="20" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="362" y="259" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">B3</text>

  <!-- Strong connections within B -->
  <line x1="340" y1="180" x2="380" y2="180" stroke="#58a6ff" stroke-width="3" opacity="0.7"/>
  <line x1="328" y1="197" x2="350" y2="238" stroke="#58a6ff" stroke-width="3" opacity="0.7"/>
  <line x1="393" y1="198" x2="374" y2="239" stroke="#58a6ff" stroke-width="3" opacity="0.7"/>

  <!-- Subsystem C -->
  <rect x="465" y="115" width="175" height="175" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="2"/>
  <text x="552" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7ee787" font-weight="600">Subsystem C</text>

  <!-- Nodes in C -->
  <circle cx="510" cy="190" r="20" fill="#0d1117" stroke="#7ee787" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="510" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">C1</text>

  <circle cx="595" cy="190" r="20" fill="#0d1117" stroke="#7ee787" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="595" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c9d1d9">C2</text>

  <!-- Strong connections within C -->
  <line x1="530" y1="190" x2="575" y2="190" stroke="#7ee787" stroke-width="3" opacity="0.7"/>

  <!-- Weak connections between subsystems (thin dashed lines) -->
  <!-- A to B -->
  <line x1="228" y1="175" x2="300" y2="178" stroke="#8b949e" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- B to C -->
  <line x1="420" y1="180" x2="490" y2="188" stroke="#8b949e" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- A to C (very weak) -->
  <path d="M220 260 Q360 330 500 206" stroke="#8b949e" stroke-width="0.8" stroke-dasharray="3,5" opacity="0.3" fill="none"/>

  <!-- Legend -->
  <rect x="85" y="320" width="560" height="60" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <!-- Strong connection legend -->
  <line x1="110" y1="340" x2="150" y2="340" stroke="#6C63FF" stroke-width="3" opacity="0.7"/>
  <text x="160" y="344" font-family="system-ui, sans-serif" font-size="11" fill="#c9d1d9">Strong intra-subsystem coupling</text>

  <!-- Weak connection legend -->
  <line x1="110" y1="365" x2="150" y2="365" stroke="#8b949e" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="160" y="369" font-family="system-ui, sans-serif" font-size="11" fill="#c9d1d9">Weak inter-subsystem coupling</text>

  <!-- Key insight text -->
  <text x="500" y="344" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e" font-style="italic">Interactions within &gt;&gt;</text>
  <text x="500" y="360" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e" font-style="italic">Interactions between</text>

  <!-- Bottom annotation -->
  <text x="360" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e" font-style="italic">Near-decomposable systems are more robust, evolvable, and comprehensible.</text>
  <text x="360" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e" font-style="italic">Multi-Agent teams should decompose tasks along natural "seams" of weak coupling.</text>
</svg>